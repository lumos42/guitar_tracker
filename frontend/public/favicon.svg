<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1a14"/>
      <stop offset="100%" stop-color="#0f0d0a"/>
    </linearGradient>
    <linearGradient id="body" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f0a820"/>
      <stop offset="45%" stop-color="#d48810"/>
      <stop offset="100%" stop-color="#a86a08"/>
    </linearGradient>
    <linearGradient id="neck" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c47a0a"/>
      <stop offset="50%" stop-color="#e09414"/>
      <stop offset="100%" stop-color="#b87008"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0a820" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f0a820" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle glow behind guitar -->
  <ellipse cx="16" cy="20" rx="11" ry="10" fill="url(#glow)"/>

  <!-- Guitar body — single organic path -->
  <path d="
    M 16 9.5
    C 19.5 9.5, 21.8 11.2, 21.2 13.8
    C 20.8 15.2, 20.2 15.8, 20.4 16.6
    C 21.6 17.4, 23.2 19.2, 23.2 22
    C 23.2 26, 20.2 29, 16 29
    C 11.8 29, 8.8 26, 8.8 22
    C 8.8 19.2, 10.4 17.4, 11.6 16.6
    C 11.8 15.8, 11.2 15.2, 10.8 13.8
    C 10.2 11.2, 12.5 9.5, 16 9.5 Z
  " fill="url(#body)"/>

  <!-- Neck -->
  <rect x="14.2" y="3" width="3.6" height="7.5" rx="1.3" fill="url(#neck)"/>

  <!-- Headstock -->
  <rect x="12.4" y="2" width="7.2" height="2.8" rx="1.4" fill="#c47a0a"/>
  <!-- Tuning peg dots -->
  <circle cx="13.4" cy="3.4" r="0.7" fill="#f0a820" opacity="0.9"/>
  <circle cx="18.6" cy="3.4" r="0.7" fill="#f0a820" opacity="0.9"/>

  <!-- Neck-body fret marker -->
  <rect x="14.2" y="9.2" width="3.6" height="0.6" rx="0.3" fill="#f5c040" opacity="0.7"/>

  <!-- Sound hole -->
  <circle cx="16" cy="21.5" r="3" fill="#0a0805"/>
  <circle cx="16" cy="21.5" r="3" fill="none" stroke="#f0a820" stroke-width="0.6" opacity="0.5"/>

  <!-- Bridge -->
  <rect x="13.2" y="25.2" width="5.6" height="1.4" rx="0.7" fill="#c47a0a"/>
  <line x1="14" y1="25.2" x2="14" y2="21.5" stroke="#d4900c" stroke-width="0.25" opacity="0.5"/>
  <line x1="16" y1="25.2" x2="16" y2="21.5" stroke="#d4900c" stroke-width="0.25" opacity="0.5"/>
  <line x1="18" y1="25.2" x2="18" y2="21.5" stroke="#d4900c" stroke-width="0.25" opacity="0.5"/>

  <!-- Body highlight (sheen) -->
  <ellipse cx="12.5" cy="18.5" rx="1.6" ry="3.2" fill="white" opacity="0.07" transform="rotate(-18, 12.5, 18.5)"/>
</svg>
